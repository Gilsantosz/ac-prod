<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>AC.Prod — Controle de Produção</title>
    <script>
      // GitHub Pages SPA Routing: salva a URL e redireciona para index.html
      // Técnica: https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 1; // mantém /ac-prod/ no base
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
